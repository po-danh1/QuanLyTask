<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Task Manager</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="text-center m-0 flex-grow-1">Smart Task Manager</h1>
      <button class="btn btn-outline-danger ms-3" onclick="logout()">Logout</button>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="card text-bg-primary shadow-sm border-0">
          <div class="card-body text-center">
            <h5 class="card-title">Total Tasks</h5>
            <h2 id="totalTasks">0</h2>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card text-bg-success shadow-sm border-0">
          <div class="card-body text-center">
            <h5 class="card-title">Completed</h5>
            <h2 id="completedTasks">0</h2>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card text-bg-warning shadow-sm border-0">
          <div class="card-body text-center">
            <h5 class="card-title">Pending</h5>
            <h2 id="pendingTasks">0</h2>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card text-bg-danger shadow-sm border-0">
          <div class="card-body text-center">
            <h5 class="card-title">Overdue</h5>
            <h2 id="overdueTasks">0</h2>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <h4 class="mb-3">Add Task</h4>
        <div class="row g-3">
          <div class="col-md-4">
            <input id="title" class="form-control" placeholder="Title" />
          </div>

          <div class="col-md-3">
            <input id="description" class="form-control" placeholder="Description" />
          </div>

          <div class="col-md-2">
            <select id="priority" class="form-select">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>

          <div class="col-md-2">
            <input id="deadline" type="datetime-local" class="form-control" />
          </div>

          <div class="col-md-1">
            <button class="btn btn-primary w-100" onclick="addTask()">Add</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-3">
            <input id="search" class="form-control" placeholder="Search task" />
          </div>

          <div class="col-md-2">
            <select id="filterPriority" class="form-select">
              <option value="">All Priority</option>
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>

          <div class="col-md-2">
            <select id="filterStatus" class="form-select">
              <option value="">All Status</option>
              <option value="pending">Pending</option>
              <option value="progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>

          <div class="col-md-3">
            <select id="sortBy" class="form-select">
              <option value="newest">Newest</option>
              <option value="oldest">Oldest</option>
              <option value="deadline_asc">Nearest Deadline</option>
              <option value="priority_desc">Highest Priority</option>
            </select>
          </div>

          <div class="col-md-1">
            <button class="btn btn-success w-100" onclick="applyFilter()">Filter</button>
          </div>

          <div class="col-md-1">
            <button class="btn btn-secondary w-100" onclick="resetFilter()">Reset</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Priority</th>
                <th>Deadline</th>
                <th>Status</th>
                <th width="320">Action</th>
              </tr>
            </thead>
            <tbody id="taskTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-center align-items-center gap-3 mb-5">
      <button class="btn btn-outline-secondary" onclick="prevPage()">Prev</button>
      <span id="pageNumber" class="fw-bold">Page 1</span>
      <button class="btn btn-outline-secondary" onclick="nextPage()">Next</button>
    </div>

    <h2 class="mb-3">Kanban Board</h2>
    <div class="row g-3">
      <div class="col-md-4">
        <div class="kanban-wrapper">
          <h5>Pending</h5>
          <div
            id="pending"
            class="kanban-column"
            ondrop="drop(event,'pending')"
            ondragover="allowDrop(event)"
          ></div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="kanban-wrapper">
          <h5>In Progress</h5>
          <div
            id="progress"
            class="kanban-column"
            ondrop="drop(event,'progress')"
            ondragover="allowDrop(event)"
          ></div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="kanban-wrapper">
          <h5>Completed</h5>
          <div
            id="completed"
            class="kanban-column"
            ondrop="drop(event,'completed')"
            ondragover="allowDrop(event)"
          ></div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Task Detail</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p><strong>Title:</strong> <span id="detailTitle"></span></p>
          <p><strong>Description:</strong> <span id="detailDescription"></span></p>
          <p><strong>Priority:</strong> <span id="detailPriority"></span></p>
          <p><strong>Status:</strong> <span id="detailStatus"></span></p>
          <p><strong>Deadline:</strong> <span id="detailDeadline"></span></p>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId" />

          <label class="form-label">Title</label>
          <input id="editTitle" class="form-control mb-3" />

          <label class="form-label">Description</label>
          <input id="editDescription" class="form-control mb-3" />

          <label class="form-label">Priority</label>
          <select id="editPriority" class="form-select mb-3">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>

          <label class="form-label">Status</label>
          <select id="editStatus" class="form-select mb-3">
            <option value="pending">Pending</option>
            <option value="progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>

          <label class="form-label">Deadline</label>
          <input id="editDeadline" type="datetime-local" class="form-control" />
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" onclick="updateTask()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="appToast" class="toast align-items-center text-bg-dark border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage">
          Thông báo
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/kanban.js"></script>
  <script src="js/task.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
